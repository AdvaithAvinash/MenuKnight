<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdliPeek — Peek before you pick</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fef9f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      color: #c0392b;
      letter-spacing: -0.5px;
    }

    header p {
      color: #666;
      margin-top: 0.4rem;
      font-size: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #e0c9a6;
      border-radius: 12px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      background: #fdf3e3;
      border-color: #c0392b;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone .icon { font-size: 2.5rem; }
    .drop-zone .label {
      margin-top: 0.75rem;
      font-weight: 600;
      color: #444;
    }
    .drop-zone .sublabel {
      font-size: 0.8rem;
      color: #999;
      margin-top: 0.3rem;
    }

    #preview {
      margin-top: 1rem;
      max-height: 200px;
      width: 100%;
      object-fit: contain;
      border-radius: 8px;
      display: none;
    }

    button#analyzeBtn {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.85rem;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button#analyzeBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button#analyzeBtn:hover:not(:disabled) {
      background: #a93226;
    }

    /* Status */
    #status {
      margin-top: 1rem;
      font-size: 0.9rem;
      text-align: center;
      color: #888;
      min-height: 1.2em;
    }

    /* Results */
    #results {
      margin-top: 1.5rem;
      display: none;
    }

    #results h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 0.75rem;
    }

    .dish-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .dish-list li {
      background: #fef3e2;
      border-left: 4px solid #c0392b;
      padding: 0.6rem 0.9rem;
      border-radius: 0 8px 8px 0;
    }

    .dish-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .dish-desc {
      font-size: 0.82rem;
      color: #666;
      margin-top: 0.2rem;
      line-height: 1.4;
    }

    .count-badge {
      display: inline-block;
      background: #c0392b;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      margin-left: 0.5rem;
    }

    details {
      margin-top: 1rem;
    }

    summary {
      cursor: pointer;
      font-size: 0.8rem;
      color: #aaa;
      user-select: none;
    }

    pre {
      margin-top: 0.5rem;
      background: #f5f5f5;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.78rem;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
      color: #555;
    }

    .error-box {
      background: #fdecea;
      border: 1px solid #f5c6cb;
      color: #b71c1c;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #ccc;
    }
  </style>
</head>
<body>
  <header>
    <h1>🍛 IdliPeek</h1>
    <p>Upload a menu photo — we'll tell you what's on it</p>
  </header>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp" />
      <div class="icon">📷</div>
      <div class="label">Tap to choose a menu photo</div>
      <div class="sublabel">JPG, PNG or WEBP · max 4 MB</div>
    </div>

    <img id="preview" alt="Menu preview" />

    <button id="analyzeBtn" disabled>Analyze Menu</button>
    <div id="status"></div>
    <div id="results"></div>
  </div>

  <footer>Powered by Gemini Vision · IdliPeek v0.1</footer>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropZone  = document.getElementById('dropZone');
    const preview   = document.getElementById('preview');
    const btn       = document.getElementById('analyzeBtn');
    const status    = document.getElementById('status');
    const results   = document.getElementById('results');

    let selectedFile = null;

    function setFile(file) {
      if (!file) return;
      selectedFile = file;
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      btn.disabled = false;
      results.style.display = 'none';
      results.innerHTML = '';
      status.textContent = `Ready: ${file.name}`;
    }

    fileInput.addEventListener('change', () => setFile(fileInput.files[0]));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      setFile(e.dataTransfer.files[0]);
    });

    btn.addEventListener('click', async () => {
      if (!selectedFile) return;

      btn.disabled = true;
      status.textContent = '⏳ Reading image…';
      results.style.display = 'none';
      results.innerHTML = '';

      try {
        // Read file as base64 and send as JSON — avoids multipart parsing on Netlify
        const base64 = await readFileAsBase64(selectedFile);
        status.textContent = '⏳ Sending to Gemini Vision…';

        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            image: base64,
            mimeType: selectedFile.type,
            filename: selectedFile.name,
          }),
        });

        // Guard against HTML error pages (404/500) before calling .json()
        const contentType = res.headers.get('content-type') || '';
        let data;
        if (contentType.includes('application/json')) {
          data = await res.json();
        } else {
          const text = await res.text();
          throw new Error(`Server returned HTTP ${res.status} — check Netlify function logs.\n\n${text.slice(0, 400)}`);
        }

        if (!res.ok) {
          results.innerHTML = `<div class="error-box">❌ ${escHtml(data.error || 'Unknown error')}</div>`;
          results.style.display = 'block';
          status.textContent = 'Error — see above';
          return;
        }

        const items = (data.results || data.dishes.map(d => ({ dish: d, description: '' })))
          .map(({ dish, description }) => `
            <li>
              <div class="dish-name">${escHtml(dish)}</div>
              ${description ? `<div class="dish-desc">${escHtml(description)}</div>` : ''}
            </li>`).join('');
        results.innerHTML = `
          <h2>Dishes found <span class="count-badge">${data.count}</span></h2>
          <ul class="dish-list">${items}</ul>
          <details>
            <summary>Raw Gemini output</summary>
            <pre>${escHtml(data.raw_gemini_output)}</pre>
          </details>
        `;
        results.style.display = 'block';
        status.textContent = `✅ Done — ${data.count} dish${data.count !== 1 ? 'es' : ''} extracted`;
      } catch (err) {
        results.innerHTML = `<div class="error-box">❌ ${escHtml(err.message)}</div>`;
        results.style.display = 'block';
        status.textContent = 'Failed';
      } finally {
        btn.disabled = false;
      }
    });

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]); // strip "data:...;base64," prefix
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
